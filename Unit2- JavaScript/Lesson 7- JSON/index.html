<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JSON Examples</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      line-height: 1.6;
      margin: 20px;
    }
    table {
      border-collapse: collapse;
      width: 100%;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 8px;
    }
    th {
      background-color: #f4f4f4;
    }
  </style>
</head>
<body>
  <h1>JSON Examples</h1>

  <section>
    <h2>Basic JSON Display</h2>
    <div id="basic-display"></div>
  </section>

  <section>
    <h2>List of Objects</h2>
    <ul id="list-display"></ul>
  </section>

  <section>
    <h2>External JSON Data (Pokémon API)</h2>
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>URL</th>
        </tr>
      </thead>
      <tbody id="table-display"></tbody>
    </table>
  </section>

  <script src="json.js"></script>
</body>
</html>
